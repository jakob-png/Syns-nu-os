<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --white:      #212121;
  --off:        #2f2f2f;
  --off2:       #383838;
  --line:       #3f3f3f;
  --line2:      #4a4a4a;
  --black:      #ececec;
  --gray:       #8e8ea0;
  --gray2:      #6b6b80;
  --teal:       #10a37f;
  --teal-lt:    rgba(16,163,127,0.15);
  --teal-md:    rgba(16,163,127,0.25);
  --sky:        #3b9edd;
  --sky-lt:     rgba(59,158,221,0.12);
  --sky-md:     rgba(59,158,221,0.20);
  --orange:     #9b6dff;
  --orng-lt:    rgba(155,109,255,0.12);
  --orng-md:    rgba(155,109,255,0.20);
  --red:        #ef4444;
  --red-lt:     rgba(239,68,68,0.12);
  --green:      #10a37f;
  --grn-lt:     rgba(16,163,127,0.12);
  --sans:       'Söhne','Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --serif:      'Söhne','Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --r:          8px;
  --r-sm:       6px;
  --r-lg:       12px;
  --sidebar-bg: #171717;
  --topbar-bg:  rgba(33,33,33,0.95);
}

/* ── LIGHT THEME ─────────────────────────────────────────────────────── */
html.light{
  --white:      #ffffff;
  --off:        #f5f5f5;
  --off2:       #ebebeb;
  --line:       #e0e0e0;
  --line2:      #cccccc;
  --black:      #1a1a1a;
  --gray:       #666680;
  --gray2:      #999ab0;
  --teal-lt:    rgba(16,163,127,0.12);
  --teal-md:    rgba(16,163,127,0.20);
  --sky-lt:     rgba(59,158,221,0.10);
  --orng-lt:    rgba(155,109,255,0.10);
  --red-lt:     rgba(239,68,68,0.10);
  --grn-lt:     rgba(16,163,127,0.10);
  --sidebar-bg: #f0f0f0;
  --topbar-bg:  rgba(250,250,250,0.95);
}

html{font-size:14px;-webkit-font-smoothing:antialiased}
body{background:var(--white);color:var(--black);font-family:var(--sans);height:100vh;overflow:hidden;line-height:1.6}

/* ── APP SHELL ──────────────────────────────────────────────────────── */
.app-shell{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ────────────────────────────────────────────────────────── */
.sidebar{
  width:260px;flex-shrink:0;
  background:var(--sidebar-bg);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  height:100vh;overflow-y:auto;overflow-x:hidden;
  transition:width 200ms ease;
}
.sidebar.collapsed{width:0}
.sb-top{
  padding:16px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0;text-decoration:none;min-width:0}
.logo-icon{
  width:28px;height:28px;background:var(--teal);
  border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.logo-icon svg{width:14px;height:14px}
.logo-text{font-family:var(--serif);font-size:1.05rem;color:var(--black);font-weight:700;white-space:nowrap}
.logo-text em{font-style:normal;color:var(--teal)}

.sb-new-btn{
  margin:12px 10px 4px;width:calc(100% - 20px);
  justify-content:center;background:var(--teal);color:#fff;
  border-color:var(--teal);border-radius:var(--r);padding:9px 16px;font-size:0.82rem;
}
.sb-new-btn:hover{background:#0e8f6f;transform:none;box-shadow:0 0 0 3px var(--teal-lt)}

.sb-nav{padding:8px;flex:1}
.sb-nav-label{
  font-size:0.65rem;font-weight:700;text-transform:uppercase;
  letter-spacing:0.8px;color:var(--gray2);padding:8px 10px 4px;
}
.sb-item{
  display:flex;align-items:center;width:100%;padding:8px 10px;
  border-radius:var(--r);font-size:0.82rem;font-weight:500;
  color:var(--gray);cursor:pointer;transition:all 0.15s;
  border:none;background:none;font-family:var(--sans);gap:8px;text-align:left;
  white-space:nowrap;
}
.sb-item:hover{color:var(--black);background:var(--off)}
.sb-item.active{color:var(--black);background:var(--off2)}
.sb-badge{
  margin-left:auto;font-size:0.65rem;font-weight:700;
  padding:1px 6px;border-radius:20px;min-width:18px;text-align:center;
}
.nb-red   {background:var(--red-lt);  color:var(--red)}
.nb-orange{background:var(--orng-lt); color:var(--orange)}
.nb-sky   {background:var(--sky-lt);  color:var(--sky)}
.nb-teal  {background:var(--teal-lt); color:var(--teal)}
.nb-gray  {background:var(--off2);    color:var(--gray)}

.sb-team-section{border-top:1px solid var(--line);padding:10px 8px;flex-shrink:0}
.sb-team-label{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray2);padding:2px 10px 8px}

/* ── TOPBAR ─────────────────────────────────────────────────────────── */
.main-area{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.topbar{
  height:52px;padding:0 24px;
  background:var(--topbar-bg);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.hamburger{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:6px;border:none;background:transparent;
  color:var(--gray);cursor:pointer;transition:all 0.15s;flex-shrink:0;
}
.hamburger:hover{color:var(--black);background:var(--off)}
.topbar-title{font-weight:600;font-size:0.9rem;color:var(--black);flex:1}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.theme-toggle{width:32px;height:32px;border-radius:6px;border:none;background:transparent;color:var(--gray);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.theme-toggle:hover{color:var(--black);background:var(--off)}

/* ── KPI BAND ───────────────────────────────────────────────────────── */
.kpi-band{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid var(--line);
  background:var(--off);
  position:relative;z-index:1;
}
.kpi{
  padding:18px 28px;
  border-right:1px solid var(--line);
  display:flex;align-items:center;gap:14px;
  transition:background 0.12s;
}
.kpi:last-child{border-right:none}
.kpi:hover{background:var(--off2)}
.kpi-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
}
.kpi-body{flex:1;min-width:0}
.kpi-num{
  font-family:var(--serif);font-size:1.9rem;
  line-height:1;letter-spacing:-1px;color:var(--black);
}
.kpi-lbl{
  font-size:0.7rem;font-weight:600;
  text-transform:uppercase;letter-spacing:0.6px;
  color:var(--gray2);margin-top:4px;
}

/* ── LAYOUT ─────────────────────────────────────────────────────────── */

.page-head{
  display:flex;align-items:flex-start;
  justify-content:space-between;
  margin-bottom:22px;gap:16px;
}
.page-title{
  font-family:var(--serif);
  font-size:1.6rem;
  color:var(--black);
  letter-spacing:-0.4px;
  line-height:1.15;
}
.page-title em{font-style:italic;color:var(--gray);font-size:1rem;font-family:var(--sans);display:block;margin-top:2px;font-weight:400}
.page{padding:32px 32px 64px;max-width:1400px;margin:0 auto;position:relative;z-index:1}

/* ── ALERT ──────────────────────────────────────────────────────────── */
.alert{
  display:flex;align-items:center;gap:10px;
  padding:11px 16px;
  background:rgba(255,69,58,0.1);
  border:1px solid rgba(255,69,58,0.2);
  border-radius:var(--r-sm);
  margin-bottom:18px;
  animation:fadeSlide 0.25s ease;
}
.alert-led{
  width:7px;height:7px;border-radius:50%;
  background:var(--red);flex-shrink:0;
  animation:blink 1.8s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.alert-msg{font-size:0.81rem;font-weight:500;color:#ff6b63}
.alert-msg b{font-weight:700}

/* ── TOOLBAR ────────────────────────────────────────────────────────── */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px}
.search-wrap{position:relative;flex:1;max-width:300px}
.search-ico{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--gray2);font-size:0.82rem;pointer-events:none;
}
.search{
  width:100%;
  background:var(--off2);border:1px solid var(--line);
  border-radius:20px;padding:8px 14px 8px 32px;
  color:var(--black);font-family:var(--sans);font-size:0.81rem;
  outline:none;transition:all 0.15s;
}
.search:focus{border-color:var(--teal);background:var(--off);box-shadow:0 0 0 3px var(--teal-md)}
.search::placeholder{color:var(--gray2)}

/* ── TABLE ──────────────────────────────────────────────────────────── */
.tbl-wrap{
  background:var(--off);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  overflow:hidden;
  position:relative;z-index:1;
}
table{width:100%;border-collapse:collapse}

thead th{
  padding:11px 16px;text-align:left;
  font-size:0.67rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.9px;
  color:var(--gray2);background:var(--off2);
  border-bottom:1px solid var(--line);white-space:nowrap;
}
thead th:first-child{width:48px;text-align:center}

tbody tr{
  border-bottom:1px solid var(--line);
  transition:background 0.1s;
}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--off2)}

td{padding:13px 16px;vertical-align:middle;font-size:0.82rem}
td:first-child{text-align:center}

/* rank */
.rank{
  font-family:var(--serif);font-size:1.1rem;
  color:var(--gray2);font-weight:700;
  display:inline-block;width:28px;text-align:center;
}
.rank.r-crit{color:var(--red)}
.rank.r-urg {color:var(--orange)}

/* client cell */
.cl-name{font-weight:700;font-size:0.85rem;color:var(--black)}
.cl-tag{
  font-size:0.67rem;font-weight:600;
  color:var(--gray2);text-transform:uppercase;
  letter-spacing:0.5px;margin-top:2px;display:block;
}

/* status badge */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:20px;
  font-size:0.71rem;font-weight:600;white-space:nowrap;
}
.badge::before{
  content:'';width:5px;height:5px;
  border-radius:50%;flex-shrink:0;
}
.bs{background:var(--off2);color:var(--gray);border:1px solid var(--line2)}
.bs::before{background:var(--gray2)}
.bi{background:var(--sky-lt);color:#7dd9ff;border:1px solid rgba(90,200,250,0.2)}
.bi::before{background:var(--sky);animation:blink 1.5s infinite}
.br{background:var(--orng-lt);color:#bf7fff;border:1px solid rgba(191,127,255,0.2)}
.br::before{background:var(--orange);animation:blink 1.5s infinite}
.bd{background:var(--grn-lt);color:#30D158;border:1px solid rgba(48,209,88,0.2)}
.bd::before{background:var(--green)}

/* due */
.due-date{font-size:0.8rem;color:var(--gray);display:block}
.due-tag{
  display:inline-block;
  font-size:0.65rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.4px;
  padding:2px 7px;border-radius:4px;margin-top:3px;
}
.dt-over{background:var(--red-lt);  color:#ff6b63}
.dt-soon{background:var(--orng-lt); color:var(--orange)}
.dt-ok  {background:var(--teal-lt); color:var(--teal)}
.dt-done{background:var(--off2);    color:var(--gray2)}

/* progress */
.prog{display:flex;flex-direction:column;gap:5px;min-width:90px}
.prog-track{height:3px;border-radius:2px;background:var(--line);overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width 0.5s ease}
.prog-lbl{font-size:0.67rem;color:var(--gray2)}

/* qc */
.qc-pend{font-size:0.78rem;color:var(--orange);font-weight:500}
.qc-done{font-size:0.78rem;color:var(--green); font-weight:500}
.qc-none{font-size:0.78rem;color:var(--gray2)}
.qc-sub {font-size:0.65rem;color:var(--gray2);margin-top:2px}

/* actions */
.acts{display:flex;gap:5px;align-items:center}

.btn{
  font-family:var(--sans);font-size:0.75rem;font-weight:600;
  padding:6px 13px;border-radius:20px;
  border:1px solid transparent;cursor:pointer;
  display:inline-flex;align-items:center;gap:5px;
  transition:all 0.14s;white-space:nowrap;
  letter-spacing:0.1px;
}
.btn-black{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-black:hover{background:#0e8f6f;transform:none;box-shadow:0 0 0 3px var(--teal-lt)}
.btn-line{background:transparent;color:var(--gray);border-color:var(--line2)}
.btn-line:hover{background:var(--off2);border-color:var(--gray2);color:var(--black)}
.btn-teal{background:var(--teal-lt);color:var(--teal);border-color:rgba(0,201,184,0.25)}
.btn-teal:hover{background:rgba(0,201,184,0.2)}
.btn-orng{background:var(--orng-lt);color:var(--orange);border-color:rgba(191,127,255,0.2)}
.btn-orng:hover{background:rgba(191,127,255,0.2)}
.btn-grn{background:var(--grn-lt);color:var(--green);border-color:rgba(48,209,88,0.2)}
.btn-grn:hover{background:rgba(48,209,88,0.18)}
.btn-red{background:var(--red-lt);color:var(--red);border-color:rgba(255,69,58,0.2)}
.btn-red:hover{background:rgba(255,69,58,0.2)}
.btn-ico{padding:6px 9px;border-color:var(--line);background:transparent;color:var(--gray2)}
.btn-ico:hover{border-color:var(--line2);color:var(--black);background:var(--off2)}

/* sortable headers */
.th-sort{cursor:pointer;user-select:none}
.th-sort:hover{color:var(--gray)!important}
.th-sort.th-on{color:var(--teal)!important}

/* empty */
.empty{padding:60px 24px;text-align:center;color:var(--gray2)}
.empty-i{font-size:2rem;margin-bottom:10px;opacity:0.3}
.empty-t{font-size:0.85rem}

/* ── MODALS ──────────────────────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(8px);
  z-index:500;display:none;
  align-items:center;justify-content:center;padding:20px;
}
.overlay.open{display:flex}

.modal{
  background:var(--off);
  border:1px solid var(--line2);
  border-radius:var(--r-lg);
  padding:28px;width:500px;max-width:100%;
  box-shadow:0 16px 48px rgba(0,0,0,0.5),0 2px 8px rgba(0,0,0,0.3);
  animation:mIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-lg{width:580px}
@keyframes mIn{from{transform:scale(0.95) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

.modal-hd{margin-bottom:22px}
.modal-title{
  font-family:var(--serif);font-size:1.25rem;
  color:var(--black);letter-spacing:-0.3px;
}
.modal-sub{font-size:0.78rem;color:var(--gray);margin-top:3px}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
.flbl{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--gray)}
.finp,.fsel{
  background:var(--off2);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:9px 12px;
  color:var(--black);font-family:var(--sans);font-size:0.83rem;
  outline:none;transition:all 0.14s;
}
.finp:focus,.fsel:focus{border-color:var(--teal);background:var(--off);box-shadow:0 0 0 3px var(--teal-md)}
.finp::placeholder{color:var(--gray2)}
.fsel option{background:var(--off2);color:var(--black)}

.modal-ft{
  display:flex;justify-content:flex-end;gap:8px;
  margin-top:22px;padding-top:18px;border-top:1px solid var(--line);
}

/* QC in modal */
.qc-box{
  background:var(--off2);border:1px solid var(--line);
  border-radius:var(--r);padding:16px;margin-bottom:16px;
}.qc-box-hd{
  font-size:0.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.8px;
  color:var(--gray);margin-bottom:12px;
}
.qci{
  display:flex;align-items:center;gap:10px;
  padding:9px 0;
  border-bottom:1px solid var(--line);
  cursor:pointer;transition:opacity 0.12s;
}
.qci:last-child{border-bottom:none}
.qci:hover{opacity:0.75}
.qci-check{
  width:18px;height:18px;border-radius:5px;
  border:1.5px solid var(--line2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.14s;font-size:10px;font-weight:900;
}
.qci-check.on{background:var(--teal);border-color:var(--teal);color:var(--white)}
.qci-txt{font-size:0.8rem;color:var(--black);flex:1}
.qc-foot{
  display:flex;align-items:center;gap:10px;
  margin-top:10px;padding-top:10px;border-top:1px solid var(--line);
}
.qc-ft-track{flex:1;height:3px;background:var(--line);border-radius:2px;overflow:hidden}
.qc-ft-fill{height:100%;background:var(--teal);border-radius:2px;transition:width 0.3s ease}
.qc-ft-lbl{font-size:0.72rem;color:var(--gray);font-weight:600}

/* Advance modal */
.adv-head{
  display:flex;align-items:center;gap:14px;margin-bottom:16px;
}
.adv-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;
}

/* ── TOASTS ──────────────────────────────────────────────────────────── */
.toasts{
  position:fixed;bottom:22px;right:22px;
  z-index:999;display:flex;flex-direction:column;gap:7px;
  pointer-events:none;
}
.toast{
  display:flex;align-items:center;gap:10px;
  padding:11px 16px;
  background:var(--off2);color:var(--black);
  border:1px solid var(--line2);
  border-radius:var(--r);
  font-size:0.8rem;font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  animation:tIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
  min-width:220px;max-width:320px;pointer-events:all;
}
@keyframes tIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ── BOARD / KANBAN ──────────────────────────────────────────────────── */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
.board-col{background:var(--off);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
.board-col-hd{padding:12px 16px;border-bottom:1px solid var(--line);font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray2);display:flex;align-items:center;justify-content:space-between}
.board-col-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:120px}
.card{background:var(--off2);border:1px solid var(--line);border-radius:var(--r);padding:14px;transition:border-color 0.15s}
.card:hover{border-color:var(--line2)}
.card-name{font-weight:700;font-size:0.85rem;color:var(--black);margin-bottom:2px}
.card-tag{font-size:0.67rem;color:var(--gray2);text-transform:uppercase;letter-spacing:0.5px}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:8px}
.avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;color:#0f1117;flex-shrink:0}

/* ── CONTENT ITEMS ───────────────────────────────────────────────────── */
.items-box{background:var(--off2);border:1px solid var(--line);border-radius:var(--r);padding:0 12px;margin-bottom:8px;max-height:180px;overflow-y:auto}
.item-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
.item-row:last-child{border-bottom:none}
.item-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0;transition:all 0.14s;cursor:pointer}
.item-check.on{background:var(--teal);border-color:var(--teal);color:var(--white)}
.item-title{flex:1;font-size:0.8rem;color:var(--black)}
.item-meta{font-size:0.65rem;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--off);color:var(--gray);border:1px solid var(--line);white-space:nowrap}
.item-del{font-size:0.75rem;color:var(--gray2);cursor:pointer;padding:3px 6px;border-radius:4px;border:none;background:none;transition:all 0.12s}
.item-del:hover{color:var(--red);background:var(--red-lt)}

/* ── TEAM ────────────────────────────────────────────────────────────── */
.avatar-chip{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:600;padding:2px 8px 2px 4px;border-radius:20px;background:var(--off2);border:1px solid var(--line2);white-space:nowrap}
.team-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.team-row:last-child{border-bottom:none}

/* ── VIEW TOGGLE ─────────────────────────────────────────────────────── */
.view-toggle{display:flex;gap:3px;background:var(--off2);border-radius:20px;padding:3px}
.vt-btn{font-family:var(--sans);font-size:0.75rem;font-weight:600;padding:5px 12px;border-radius:17px;border:none;cursor:pointer;transition:all 0.14s;color:var(--gray2);background:transparent}
.vt-btn.on{background:var(--off2);color:var(--black);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.filter-chips{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.fchip{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:600;padding:4px 10px 4px 5px;border-radius:20px;background:var(--off2);border:1px solid var(--line2);cursor:pointer;transition:all 0.15s;color:var(--gray)}
.fchip:hover{border-color:var(--teal);color:var(--teal)}
.fchip.active{background:var(--teal-lt);border-color:rgba(0,201,184,0.25);color:var(--teal)}

/* ── CONTENT BOARD MODAL ─────────────────────────────────────────────── */
.board-modal{width:min(95vw,1400px);max-height:90vh;padding:0;overflow:hidden;display:flex;flex-direction:column}
.board-mhd{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-shrink:0}
.board-mhd-text{flex:1;min-width:0}
.board-mhd-name{font-size:1rem;font-weight:700;color:var(--black)}
.board-mhd-sub{font-size:0.72rem;color:var(--gray);margin-top:1px}

/* board scroll area — light inset */
.kb-wrap{display:flex;gap:0;overflow-x:auto;overflow-y:hidden;padding:20px 20px 24px;flex:1;min-height:0;background:#f0f0f0;align-items:flex-start;scrollbar-width:thin}

/* column */
.kb-col{min-width:264px;max-width:264px;display:flex;flex-direction:column;flex-shrink:0}
.kb-col+.kb-col{border-left:1px solid #d8d8d8;padding-left:16px}

/* column header */
.kb-col-hd{display:flex;align-items:center;gap:6px;margin-bottom:12px;padding-right:4px}
.kb-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;font-size:0.73rem;font-weight:700;flex:1;min-width:0}
.kb-count{font-size:0.62rem;font-weight:800;background:rgba(0,0,0,0.12);padding:1px 6px;border-radius:10px;margin-left:2px}
.kb-col-del{width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:#aaa;font-size:0.8rem;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.kb-col-del:hover{background:#ffeeee;color:#e74c3c}

/* cards */
.kb-cards{display:flex;flex-direction:column;gap:8px;min-height:64px;flex:1}
.kb-card{background:#ffffff;border:1px solid #e2e2e2;border-radius:8px;padding:12px 13px;cursor:pointer;transition:border-color 0.14s,box-shadow 0.14s;user-select:none}
.kb-card:hover{border-color:#b0b0b0;box-shadow:0 2px 8px rgba(0,0,0,0.09)}
.kb-card.dragging{opacity:0.35}
.kb-card-title{font-size:0.82rem;font-weight:600;color:#1a1a1a;margin-bottom:3px;line-height:1.3}
.kb-card-hook{font-size:0.7rem;color:#666;margin-top:4px;font-style:italic;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.kb-card-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.kb-tag{font-size:0.62rem;font-weight:600;padding:2px 7px;border-radius:20px;background:#f0f0f0;color:#555;border:1px solid #e0e0e0}

/* add record button */
.kb-add-btn{margin-top:8px;width:100%;text-align:left;padding:7px 11px;border-radius:6px;border:1.5px dashed #ccc;background:transparent;color:#999;font-size:0.76rem;cursor:pointer;font-family:var(--sans);transition:all 0.14s;display:flex;align-items:center;gap:5px}
.kb-add-btn:hover{border-color:#10a37f;color:#10a37f;background:rgba(16,163,127,0.07)}

/* drop zone highlight */
.kb-drop-zone.drag-over{outline:2px dashed #10a37f;outline-offset:3px;background:rgba(16,163,127,0.06);border-radius:8px}

/* add column button */
.kb-new-col-wrap{padding-left:16px;flex-shrink:0}
.kb-new-col-btn{min-width:190px;padding:9px 16px;border-radius:8px;border:1.5px dashed #ccc;background:transparent;color:#999;font-size:0.78rem;cursor:pointer;font-family:var(--sans);transition:all 0.14s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.kb-new-col-btn:hover{border-color:#10a37f;color:#10a37f;background:rgba(16,163,127,0.07)}

/* card edit modal sits above board modal */
#mCardEdit{z-index:600}
/* board modal anchored to top */
#mBoard{align-items:flex-start;padding-top:20px}
</style>
</head>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const CYCLE = 90;
const COLORS = ['#00C9B8','#5AC8FA','#bf7fff','#30D158','#FF453A','#FFD60A','#FF9F0A'];
let team = JSON.parse(localStorage.getItem('cf3-team') || '[]');
function saveTeam(){ localStorage.setItem('cf3-team', JSON.stringify(team)); }

const QC = [
  "Videos match the content plan",
  "Brand guidelines followed throughout",
  "All captions and CTAs are correct",
  "Video quality — resolution, audio & lighting",
  "Content plan covers the full 3-month period",
  "Files correctly named and organized",
  "Thumbnails and links provided"
];

let clients = JSON.parse(localStorage.getItem('cf3') || 'null');
if (!clients) {
  const ago = n => { let d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().split('T')[0]; };
  clients = [
    {id:1,  name:"Acme Corp",         tag:"E-commerce",  last:ago(97),  s:"scheduled",  notes:"Prefers short reels",          qc:[],        qn:"", rev:0},
    {id:2,  name:"BlueWave Media",    tag:"SaaS",        last:ago(91),  s:"scheduled",  notes:"",                             qc:[],        qn:"", rev:0},
    {id:3,  name:"Sunrise Foods",     tag:"Food & Bev",  last:ago(85),  s:"inprogress", notes:"Seasonal promos",              qc:[],        qn:"", rev:0},
    {id:4,  name:"NextGen Realty",    tag:"Real Estate", last:ago(76),  s:"review",     notes:"",                             qc:[0,1,2,3], qn:"", rev:0},
    {id:5,  name:"Pixel Studio",      tag:"Design",      last:ago(60),  s:"scheduled",  notes:"",                             qc:[],        qn:"", rev:0},
    {id:6,  name:"OakPath Finance",   tag:"Finance",     last:ago(28),  s:"delivered",  notes:"",                             qc:[0,1,2,3,4,5,6], qn:"Great work!", rev:1},
    {id:7,  name:"FitLife Gym",       tag:"Fitness",     last:ago(52),  s:"scheduled",  notes:"Motivational content",         qc:[],        qn:"", rev:0},
    {id:8,  name:"Metro Tech",        tag:"Tech",        last:ago(12),  s:"delivered",  notes:"",                             qc:[0,1,2,3,4,5,6], qn:"", rev:0},
    {id:9,  name:"Helix Health",      tag:"Healthcare",  last:ago(93),  s:"inprogress", notes:"HIPAA-compliant only",         qc:[],        qn:"", rev:2},
    {id:10, name:"Wanderlust Travel", tag:"Travel",      last:ago(79),  s:"scheduled",  notes:"",                             qc:[],        qn:"", rev:0},
  ];
  save();
}

let nid = Math.max(...clients.map(c=>c.id),0)+1;
let fil='all', q='', editId=null, revId=null, revChecks=[], sCol='due', sDir=1;
let view='table', filterAssignee=null, editItems=[];
let boardClientId=null, ceColId=null, ceCardId=null;
let kbNextColId=1000, kbNextCardId=10000;
// Sync ID counters from stored data
clients.forEach(c=>{ if(!c.contentBoard) return;
  c.contentBoard.columns.forEach(col=>{
    if(col.id>=kbNextColId) kbNextColId=col.id+1;
    (col.cards||[]).forEach(card=>{ if(card.id>=kbNextCardId) kbNextCardId=card.id+1; });
  });
});

function save(){ localStorage.setItem('cf3', JSON.stringify(clients)); }

// ── HELPERS ───────────────────────────────────────────────────────────
const cyc     = c => c.cycle || CYCLE;
const nextDue = c => { let d=new Date(c.last); d.setDate(d.getDate()+cyc(c)); return d; };
const dLeft   = c => { let n=new Date(); n.setHours(0,0,0,0); return Math.round((nextDue(c)-n)/86400000); };
const pct     = c => { let s=new Date(c.last),e=nextDue(c),n=new Date(); return Math.min(100,Math.max(0,(n-s)/(e-s)*100)); };

function getList(){
  let l=[...clients];
  if(q){ const lq=q.toLowerCase(); l=l.filter(c=>c.name.toLowerCase().includes(lq)||c.tag.toLowerCase().includes(lq)); }
  if(filterAssignee) l=l.filter(c=>c.assignee===filterAssignee);
  if(fil==='overdue')    l=l.filter(c=>dLeft(c)<0  && c.s!=='delivered');
  if(fil==='upcoming')   l=l.filter(c=>dLeft(c)>=0 && dLeft(c)<=14 && c.s!=='delivered');
  if(fil==='inprogress') l=l.filter(c=>c.s==='inprogress');
  if(fil==='review')     l=l.filter(c=>c.s==='review');
  if(fil==='delivered')  l=l.filter(c=>c.s==='delivered');
  l.sort((a,b)=>{
    if(fil!=='delivered'){
      if(a.s==='delivered'&&b.s!=='delivered') return 1;
      if(b.s==='delivered'&&a.s!=='delivered') return -1;
    }
    let va,vb;
    if(sCol==='name')  {va=a.name.toLowerCase();      vb=b.name.toLowerCase();}
    else if(sCol==='tag')    {va=(a.tag||'').toLowerCase(); vb=(b.tag||'').toLowerCase();}
    else if(sCol==='status') {va=a.s;                       vb=b.s;}
    else if(sCol==='cycle')  {va=pct(a);                    vb=pct(b);}
    else                     {va=dLeft(a);                  vb=dLeft(b);}
    return va<vb?-sDir:va>vb?sDir:0;
  });
  return l;
}

function cts(){
  return {
    all:       clients.length,
    overdue:   clients.filter(c=>dLeft(c)<0&&c.s!=='delivered').length,
    upcoming:  clients.filter(c=>dLeft(c)>=0&&dLeft(c)<=14&&c.s!=='delivered').length,
    inprogress:clients.filter(c=>c.s==='inprogress').length,
    review:    clients.filter(c=>c.s==='review').length,
    delivered: clients.filter(c=>c.s==='delivered').length,
  };
}

// ── RENDER ────────────────────────────────────────────────────────────
function memberChip(c){
  const m=team.find(x=>x.id===c.assignee);
  if(!m) return '';
  return `<span class="avatar-chip"><span class="avatar" style="background:${m.color}">${m.name[0]}</span>${m.name}</span>`;
}

function itemsBar(c){
  const items=c.items||[];
  if(!items.length) return `<span class="qc-none">—</span>`;
  const done=items.filter(x=>x.done).length;
  const pColor=done===items.length?'var(--teal)':done>0?'var(--orange)':'var(--gray2)';
  return `<div class="prog">
    <div class="prog-track"><div class="prog-fill" style="width:${Math.round(done/items.length*100)}%;background:${pColor}"></div></div>
    <span class="prog-lbl">${done}/${items.length} done</span>
  </div>`;
}

function renderCard(c){
  const dl=dLeft(c), pp=pct(c), done=c.s==='delivered';
  const pColor=pp>=100?'var(--red)':pp>75?'var(--orange)':'var(--teal)';
  let dtTxt=done?'Done':dl<0?`${Math.abs(dl)}d overdue`:`${dl}d left`;
  let dtCol=done?'var(--gray2)':dl<0?'var(--red)':dl<=7?'var(--orange)':'var(--teal)';
  const m=team.find(x=>x.id===c.assignee);
  let actHtml='';
  if(c.s==='scheduled')  actHtml=`<button class="btn btn-line" style="font-size:0.7rem;padding:4px 10px" onclick="advance(${c.id},'inprogress')">▷ Start</button>`;
  if(c.s==='inprogress') actHtml=`<button class="btn btn-line" style="font-size:0.7rem;padding:4px 10px" onclick="advance(${c.id},'review')">→ Submit</button>`;
  if(c.s==='review')     actHtml=`<button class="btn btn-orng" style="font-size:0.7rem;padding:4px 10px" onclick="openReview(${c.id})">◎ Review</button>`;
  if(c.s==='delivered')  actHtml=`<button class="btn btn-line" style="font-size:0.7rem;padding:4px 10px" onclick="newCycle(${c.id})">↺ New Cycle</button>`;
  return `<div class="card" onclick="openEdit(${c.id})">
    <div class="card-name">${c.name}</div>
    <div class="card-tag">${c.tag||''}</div>
    <div class="prog" style="margin-top:10px">
      <div class="prog-track"><div class="prog-fill" style="width:${pp}%;background:${pColor}"></div></div>
      <span class="prog-lbl" style="color:${dtCol}">${dtTxt}</span>
    </div>
    <div class="card-foot" onclick="event.stopPropagation()">
      ${m?`<span class="avatar" style="background:${m.color}" title="${m.name}">${m.name[0]}</span>`:'<span></span>'}
      <div style="display:flex;gap:4px;margin-left:auto">
        <button class="btn btn-ico btn-line" style="font-size:0.7rem;padding:3px 7px" onclick="openBoard(${c.id})" title="Content Board">⊞</button>
        ${actHtml}
      </div>
    </div>
  </div>`;
}

function renderBoard(list){
  const cols=['scheduled','inprogress','review','delivered'];
  const lbl={scheduled:'Scheduled',inprogress:'In Progress',review:'Manager Review',delivered:'Delivered'};
  const acc={scheduled:'var(--gray2)',inprogress:'var(--sky)',review:'var(--orange)',delivered:'var(--teal)'};
  return `<div class="board">${cols.map(col=>{
    const cards=list.filter(c=>c.s===col);
    return `<div class="board-col">
      <div class="board-col-hd"><span>${lbl[col]}</span><span class="hn-badge nb-gray" style="background:var(--off);color:${acc[col]}">${cards.length}</span></div>
      <div class="board-col-body">${cards.length?cards.map(c=>renderCard(c)).join(''):`<div style="padding:20px;color:var(--gray2);font-size:0.78rem;text-align:center;opacity:0.5">Empty</div>`}</div>
    </div>`;
  }).join('')}</div>`;
}

function render(){
  const ct = cts();

  document.getElementById('nc-all').textContent       = ct.all;
  document.getElementById('nc-overdue').textContent   = ct.overdue;
  document.getElementById('nc-upcoming').textContent  = ct.upcoming;
  document.getElementById('nc-inprogress').textContent= ct.inprogress;
  document.getElementById('nc-review').textContent    = ct.review;
  document.getElementById('nc-delivered').textContent = ct.delivered;

  const kpis = [
    {n:ct.overdue,    l:'Overdue',     c:'var(--red)',    dot:'var(--red)'},
    {n:ct.upcoming,   l:'Due in 14d',  c:'var(--orange)', dot:'var(--orange)'},
    {n:ct.inprogress, l:'In Progress', c:'var(--sky)',    dot:'var(--sky)'},
    {n:ct.review,     l:'In Review',   c:'var(--teal)',   dot:'var(--teal)'},
  ];
  document.getElementById('kpiBand').innerHTML = kpis.map(k=>`
    <div class="kpi">
      <div class="kpi-dot" style="background:${k.dot}"></div>
      <div class="kpi-body">
        <div class="kpi-num" style="color:${k.c}">${k.n}</div>
        <div class="kpi-lbl">${k.l}</div>
      </div>
    </div>`).join('');

  const list = getList();
  const titles = {all:'All Clients',overdue:'Overdue',upcoming:'Due Soon',inprogress:'In Progress',review:'Manager Review',delivered:'Delivered'};

  let alertHtml='';
  if(ct.overdue>0 && fil==='all'){
    alertHtml=`<div class="alert"><div class="alert-led"></div>
      <div class="alert-msg"><b>${ct.overdue} client${ct.overdue>1?'s':''} overdue</b> — requires immediate attention.</div>
    </div>`;
  }

  // View toggle → topbar-right
  document.getElementById('topbar-right').innerHTML=`<div class="view-toggle">
    <button class="vt-btn${view==='table'?' on':''}" onclick="setView('table')">☰ Table</button>
    <button class="vt-btn${view==='board'?' on':''}" onclick="setView('board')">⊞ Board</button>
  </div>`;
  renderSidebarTeam();

  let mainHtml='';
  if(view==='board'){
    mainHtml=renderBoard(list);
  } else {
    let rows='';
    if(!list.length){
      rows=`<tr><td colspan="9"><div class="empty"><div class="empty-i">◈</div><div class="empty-t">Nothing here</div></div></td></tr>`;
    } else {
      list.forEach((c,i)=>{
        const dl=dLeft(c), pp=pct(c), done=c.s==='delivered';
        const rankCls=!done&&dl<0?'r-crit':!done&&dl<=7?'r-urg':'';
        const rankVal=done?'—':i+1;
        const bMap={scheduled:['bs','Scheduled'],inprogress:['bi','In Progress'],review:['br','Manager Review'],delivered:['bd','Delivered']};
        const [bCls,bLbl]=bMap[c.s]||bMap.scheduled;
        let dtCls='dt-ok',dtTxt=`${dl}d left`;
        if(done){dtCls='dt-done';dtTxt='Done'}
        else if(dl<0){dtCls='dt-over';dtTxt=`${Math.abs(dl)}d overdue`}
        else if(dl<=14){dtCls='dt-soon';dtTxt=`${dl}d left`}
        const dFmt=nextDue(c).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
        const pColor=pp>=100?'var(--red)':pp>75?'var(--orange)':'var(--teal)';
        let qcHtml=`<span class="qc-none">—</span>`;
        if(c.s==='review')    qcHtml=`<span class="qc-pend">${c.qc.length}/${QC.length} checked</span><div class="qc-sub">Awaiting review</div>`;
        if(c.s==='delivered') qcHtml=`<span class="qc-done">✓ Approved</span>${c.rev>0?`<div class="qc-sub">${c.rev} rev.</div>`:''}`;
        let actHtml='';
        if(c.s==='scheduled')  actHtml=`<button class="btn btn-line" onclick="advance(${c.id},'inprogress')">▷ Start</button>`;
        if(c.s==='inprogress') actHtml=`<button class="btn btn-line" onclick="advance(${c.id},'review')">→ Submit</button>`;
        if(c.s==='review')     actHtml=`<button class="btn btn-orng" onclick="openReview(${c.id})">◎ Review</button>`;
        if(c.s==='delivered')  actHtml=`<button class="btn btn-line" onclick="newCycle(${c.id})">↺ New Cycle</button>`;
        rows+=`<tr>
          <td><span class="rank ${rankCls}">${rankVal}</span></td>
          <td><div><div class="cl-name">${c.name}</div><span class="cl-tag">${c.tag||''}</span></div></td>
          <td><span class="badge ${bCls}">${bLbl}</span></td>
          <td>${memberChip(c)||'<span style="color:var(--gray2);font-size:0.78rem">—</span>'}</td>
          <td><div><span class="due-date">${dFmt}</span><span class="due-tag ${dtCls}">${dtTxt}</span></div></td>
          <td><div class="prog">
            <div class="prog-track"><div class="prog-fill" style="width:${pp}%;background:${pColor}"></div></div>
            <span class="prog-lbl">${Math.round(pp)}% of cycle</span>
          </div></td>
          <td><div>${qcHtml}</div></td>
          <td>${itemsBar(c)}</td>
          <td><div class="acts">
            ${actHtml}
            <button class="btn btn-ico btn-line" onclick="openBoard(${c.id})" title="Content Board" style="font-size:0.75rem">⊞</button>
            <button class="btn btn-ico btn-line" onclick="openEdit(${c.id})" title="Edit">✎</button>
            <button class="btn btn-ico btn-red"  onclick="del(${c.id})"     title="Delete">✕</button>
          </div></td>
        </tr>`;
      });
    }
    mainHtml=`<div class="tbl-wrap"><table>
      <thead><tr>
        <th>#</th>
        <th onclick="setSort('name')"  class="th-sort${sCol==='name'  ?' th-on':''}">Client ${sa('name')}</th>
        <th onclick="setSort('status')"class="th-sort${sCol==='status'?' th-on':''}">Status ${sa('status')}</th>
        <th>Assigned</th>
        <th onclick="setSort('due')"   class="th-sort${sCol==='due'   ?' th-on':''}">Next Due ${sa('due')}</th>
        <th onclick="setSort('cycle')" class="th-sort${sCol==='cycle' ?' th-on':''}" style="width:110px">Cycle ${sa('cycle')}</th>
        <th>QC</th><th style="width:110px">Plan</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  }

  document.getElementById('page').innerHTML = `
    ${alertHtml}
    <div class="page-head">
      <div class="page-title">${titles[fil]||'All Clients'} <em>${list.length} client${list.length!==1?'s':''}</em></div>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-ico">⌕</span>
        <input class="search" placeholder="Search clients…" value="${q}" oninput="doSearch(this.value)">
      </div>
      <button class="btn btn-line" style="margin-left:auto" onclick="exportCSV()">↓ Export CSV</button>
    </div>
    ${mainHtml}`;
}

// ── FILTER / SEARCH ───────────────────────────────────────────────────
function setFilter(f){
  fil=f;
  document.querySelectorAll('.sb-item[data-f]').forEach(x=>x.classList.remove('active'));
  const t=document.querySelector(`[data-f="${f}"]`);
  if(t) t.classList.add('active');
  render();
}
function doSearch(v){ q=v; render(); }
function setView(v){ view=v; render(); }
function setAssigneeFilter(id){ filterAssignee=filterAssignee===id?null:id; render(); }
function setSort(col){ sCol===col?sDir*=-1:(sCol=col,sDir=1); render(); }
function sa(col){ return `<span style="opacity:${sCol===col?1:0.25};font-size:0.6rem">${sCol===col&&sDir===-1?'↓':'↑'}</span>`; }
function exportCSV(){
  const h=['Name','Industry','Status','Assigned To','Next Due','Days Left','Cycle %','Revisions','Items Done','Items Total','Notes'];
  const r=clients.map(c=>{
    const m=team.find(x=>x.id===c.assignee);
    const items=c.items||[];
    return [`"${c.name}"`,`"${c.tag||''}"`,c.s,m?m.name:'',
      nextDue(c).toISOString().split('T')[0],dLeft(c),Math.round(pct(c)),c.rev||0,
      items.filter(x=>x.done).length,items.length,
      `"${(c.notes||'').replace(/"/g,'""')}"`].join(',');
  });
  const csv=[h.join(','),...r].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv,'+encodeURIComponent(csv);
  a.download='contentflow-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  toast('CSV exported','teal');
}

// ── STATUS ADVANCE ────────────────────────────────────────────────────
function advance(id,to){
  const c=clients.find(x=>x.id===id);
  const cfg={
    inprogress:{icon:'▷',bg:'var(--sky-lt)',col:'var(--sky)',   title:`Start ${c.name}?`,    sub:'Allocate 2 days for videos and content plan.',btn:'▷ Start Work'},
    review:    {icon:'◎',bg:'var(--orng-lt)',col:'var(--orange)',title:`Submit for Review?`,  sub:`Send ${c.name} to the Manager Review queue.`,  btn:'→ Submit'},  };
  const cf=cfg[to];
  const icon=document.getElementById('adv-icon');
  icon.style.background=cf.bg; icon.style.color=cf.col; icon.textContent=cf.icon;
  document.getElementById('adv-title').textContent=cf.title;
  document.getElementById('adv-sub').textContent=cf.sub;
  const btn=document.getElementById('adv-btn');
  btn.textContent=cf.btn;
  btn.onclick=()=>{ c.s=to; save(); close_('mAdvance'); render(); toast('Status updated','teal'); };
  open_('mAdvance');
}

function newCycle(id){
  const c=clients.find(x=>x.id===id);
  const icon=document.getElementById('adv-icon');
  icon.style.background='var(--teal-lt)';icon.style.color='var(--teal)';icon.textContent='↺';
  document.getElementById('adv-title').textContent=`New cycle for ${c.name}?`;
  document.getElementById('adv-sub').textContent='Resets QC and restarts the 90-day cycle from today.';
  const btn=document.getElementById('adv-btn');
  btn.textContent='↺ Start New Cycle';
  btn.onclick=()=>{
    c.last=new Date().toISOString().split('T')[0];
    c.s='scheduled';c.qc=[];c.qn='';
    save();close_('mAdvance');render();toast(`New cycle — ${c.name}`,'teal');
  };
  open_('mAdvance');
}

function del(id){
  const c=clients.find(x=>x.id===id);
  if(!confirm(`Remove ${c.name}?`)) return;
  clients=clients.filter(x=>x.id!==id);
  save(); render(); toast(`${c.name} removed`,'red');
}

// ── ADD / EDIT ────────────────────────────────────────────────────────
function populateAssigneeSelect(currentId){
  const sel=document.getElementById('f-assignee');
  sel.innerHTML=`<option value="">— No assignee —</option>`+
    team.map(m=>`<option value="${m.id}"${m.id===currentId?' selected':''}>${m.name}</option>`).join('');
}
function openAdd(){
  editId=null; editItems=[];
  document.getElementById('mt-title').textContent='New Client';
  document.getElementById('mt-sub').textContent='Add a new client to your pipeline.';
  ['f-name','f-tag','f-notes'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-cycle').value=90;
  document.getElementById('f-status').value='scheduled';
  populateAssigneeSelect(null);
  renderItemsModal();
  open_('mClient');
  setTimeout(()=>document.getElementById('f-name').focus(),120);
}
function openEdit(id){
  editId=id;
  const c=clients.find(x=>x.id===id);
  editItems=[...(c.items||[])];
  document.getElementById('mt-title').textContent='Edit Client';
  document.getElementById('mt-sub').textContent=c.name;
  document.getElementById('f-name').value=c.name;
  document.getElementById('f-tag').value=c.tag||'';
  document.getElementById('f-date').value=c.last;
  document.getElementById('f-cycle').value=c.cycle||90;
  document.getElementById('f-status').value=c.s;
  document.getElementById('f-notes').value=c.notes||'';
  populateAssigneeSelect(c.assignee||null);
  renderItemsModal();
  open_('mClient');
}
function saveClient(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ toast('Name is required','red'); return; }
  const assigneeVal=document.getElementById('f-assignee').value;
  const d={name, tag:document.getElementById('f-tag').value.trim(), last:document.getElementById('f-date').value,
    cycle:parseInt(document.getElementById('f-cycle').value)||90,
    s:document.getElementById('f-status').value, notes:document.getElementById('f-notes').value.trim(),
    assignee:assigneeVal?parseInt(assigneeVal):null, items:[...editItems]};
  if(editId) Object.assign(clients.find(x=>x.id===editId),d);
  else clients.push({id:nid++,...d,qc:[],qn:'',rev:0});
  save(); close_('mClient'); render();
  toast(editId?`${name} updated`:`${name} added`,'teal');
}

// ── QC REVIEW ────────────────────────────────────────────────────────
function openReview(id){
  revId=id;
  const c=clients.find(x=>x.id===id);
  revChecks=[...(c.qc||[])];
  document.getElementById('rv-name').textContent=c.name;
  document.getElementById('rv-notes').value=c.qn||'';
  renderQC();
  open_('mReview');
}
function renderQC(){
  document.getElementById('qc-items').innerHTML=QC.map((t,i)=>`
    <div class="qci" onclick="toggleQC(${i})">
      <div class="qci-check ${revChecks.includes(i)?'on':''}">${revChecks.includes(i)?'✓':''}</div>
      <span class="qci-txt">${t}</span>
    </div>`).join('');
  const pp=Math.round(revChecks.length/QC.length*100);
  document.getElementById('qc-lbl').textContent=`${revChecks.length} / ${QC.length}`;
  document.getElementById('qc-fill').style.width=pp+'%';
  document.getElementById('qc-pct').textContent=pp+'%';
}
function toggleQC(i){
  revChecks.includes(i)?revChecks=revChecks.filter(x=>x!==i):revChecks.push(i);
  renderQC();
}
function approveClient(){
  if(revChecks.length<QC.length&&!confirm(`${revChecks.length}/${QC.length} checked. Approve anyway?`)) return;
  const c=clients.find(x=>x.id===revId);
  c.qc=revChecks; c.qn=document.getElementById('rv-notes').value;
  c.s='delivered'; c.last=new Date().toISOString().split('T')[0];
  save(); close_('mReview'); render();
  toast(`✓ ${c.name} approved`,'teal');
}
function rejectClient(){
  const c=clients.find(x=>x.id===revId);
  c.qc=revChecks; c.qn=document.getElementById('rv-notes').value;
  c.s='inprogress'; c.rev=(c.rev||0)+1;
  save(); close_('mReview'); render();
  toast(`${c.name} — revisions requested`,'red');
}

// ── TEAM ──────────────────────────────────────────────────────────────
function renderTeamList(){
  const el=document.getElementById('team-list');
  if(!el) return;
  if(!team.length){ el.innerHTML=`<div style="color:var(--gray2);font-size:0.8rem;padding:8px 0">No team members yet.</div>`; return; }
  el.innerHTML=team.map(m=>`<div class="team-row">
    <span class="avatar" style="background:${m.color};width:28px;height:28px;font-size:0.75rem">${m.name[0]}</span>
    <span style="flex:1;font-size:0.85rem;color:var(--black)">${m.name}</span>
    <button class="item-del" onclick="removeMember(${m.id})">✕</button>
  </div>`).join('');
}
function addMember(){
  const inp=document.getElementById('t-name');
  const name=inp.value.trim(); if(!name) return;
  const id=Math.max(0,...team.map(m=>m.id))+1;
  team.push({id, name, color:COLORS[team.length%COLORS.length]});
  saveTeam(); inp.value=''; renderTeamList(); render();
  toast(`${name} added to team`,'teal');
}
function removeMember(id){
  const m=team.find(x=>x.id===id);
  team=team.filter(x=>x.id!==id);
  clients.forEach(c=>{if(c.assignee===id)c.assignee=null;});
  saveTeam(); save(); renderTeamList(); render();
  toast(`${m.name} removed`,'red');
}
document.addEventListener('DOMContentLoaded',()=>{ renderTeamList(); });

// ── CONTENT ITEMS ─────────────────────────────────────────────────────
function renderItemsModal(){
  const el=document.getElementById('items-list-modal'); if(!el) return;
  if(!editItems.length){ el.innerHTML=`<div style="color:var(--gray2);font-size:0.78rem;padding:10px;text-align:center">No content items yet — add one below.</div>`; return; }
  el.innerHTML=editItems.map((it,i)=>`<div class="item-row">
    <div class="item-check${it.done?' on':''}" onclick="toggleItem(${i})">${it.done?'✓':''}</div>
    <span class="item-title">${it.title}</span>
    <span class="item-meta">${it.type} · ${it.platform}</span>
    <button class="item-del" onclick="removeItem(${i})">✕</button>
  </div>`).join('');
}
function addItem(){
  const title=document.getElementById('i-title').value.trim(); if(!title) return;
  const type=document.getElementById('i-type').value;
  const platform=document.getElementById('i-plat').value;
  const id=Math.max(0,...editItems.map(x=>x.id||0))+1;
  editItems.push({id, title, type, platform, done:false});
  document.getElementById('i-title').value='';
  renderItemsModal();
}
function removeItem(i){ editItems.splice(i,1); renderItemsModal(); }
function toggleItem(i){ editItems[i].done=!editItems[i].done; renderItemsModal(); }

// ── CONTENT BOARD ─────────────────────────────────────────────────────
const KB_COLORS = ['#b2eae4','#b3d9f7','#f7e2b3','#dbb3f7','#f7b3c6','#c6f7d4','#f7d9b3'];
const KB_TEXT   = ['#1a6b63','#1a5b8f','#7a5a1a','#5a1a7a','#7a1a3a','#1a6b3a','#7a4a1a'];

function initBoard(c){
  if(!c.contentBoard) c.contentBoard={columns:[]};
  return c.contentBoard;
}

function openBoard(id){
  boardClientId=id;
  const c=clients.find(x=>x.id===id);
  initBoard(c);
  document.getElementById('board-client-name').textContent=c.name;
  renderBoardModal();
  open_('mBoard');
}

function renderBoardModal(){
  const c=clients.find(x=>x.id===boardClientId);
  if(!c) return;
  const board=initBoard(c);
  const wrap=document.getElementById('kb-wrap');
  if(!wrap) return;

  let html='';
  board.columns.forEach((col,ci)=>{
    const bg=KB_COLORS[ci%KB_COLORS.length];
    const fg=KB_TEXT[ci%KB_TEXT.length];
    const cardsHtml=col.cards.map(card=>`
      <div class="kb-card" draggable="true"
           data-card-id="${card.id}" data-col-id="${col.id}"
           onclick="openCardEdit(${col.id},${card.id})"
           ondragstart="kbDragStart(event,${col.id},${card.id})">
        <div class="kb-card-title">${esc(card.title||'Untitled')}</div>
        ${card.notes?`<div class="kb-card-hook">${esc(card.notes.substring(0,60))}${card.notes.length>60?'…':''}</div>`:''}
      </div>`).join('');

    html+=`<div class="kb-col">
      <div class="kb-col-hd">
        <span class="kb-pill" style="background:${bg};color:${fg}">
          ${esc(col.label)}<span class="kb-count">${col.cards.length}</span>
        </span>
        <button class="kb-col-del" onclick="delBoardCol(${col.id})" title="Remove column">✕</button>
      </div>
      <div class="kb-cards kb-drop-zone" id="kbc-${col.id}"
           ondragover="kbDragOver(event)" ondragleave="kbDragLeave(event)" ondrop="kbDrop(event,${col.id})">
        ${cardsHtml}
      </div>
      <button class="kb-add-btn" onclick="addBoardCard(${col.id})">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="1" x2="5" y2="9"/><line x1="1" y1="5" x2="9" y2="5"/></svg>
        Add record
      </button>
    </div>`;
  });

  // add-column button at end
  html+=`<div class="kb-new-col-wrap">
    <button class="kb-new-col-btn" onclick="addBoardColumn()">
      <svg width="11" height="11" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="1" x2="5" y2="9"/><line x1="1" y1="5" x2="9" y2="5"/></svg>
      Add column
    </button>
  </div>`;

  wrap.innerHTML=html;
}

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// drag & drop
let kbDragging={colId:null,cardId:null};
function kbDragStart(e,colId,cardId){
  kbDragging={colId,cardId};
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{ const el=e.target; if(el) el.classList.add('dragging'); },0);
}
function kbDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function kbDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function kbDrop(e,toColId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const{colId:fromColId,cardId}=kbDragging;
  if(!cardId||fromColId===toColId) return;
  const c=clients.find(x=>x.id===boardClientId);
  const fromCol=c.contentBoard.columns.find(x=>x.id===fromColId);
  const toCol=c.contentBoard.columns.find(x=>x.id===toColId);
  if(!fromCol||!toCol) return;
  const idx=fromCol.cards.findIndex(x=>x.id===cardId);
  if(idx===-1) return;
  const[card]=fromCol.cards.splice(idx,1);
  toCol.cards.push(card);
  save(); renderBoardModal();
}
document.addEventListener('dragend',()=>{
  document.querySelectorAll('.kb-card.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.kb-drop-zone.drag-over').forEach(el=>el.classList.remove('drag-over'));
});

function addBoardColumn(){
  const label=prompt('Column name (e.g. "April content"):');
  if(!label||!label.trim()) return;
  const c=clients.find(x=>x.id===boardClientId);
  c.contentBoard.columns.push({id:kbNextColId++,label:label.trim(),cards:[]});
  save(); renderBoardModal();
}
function delBoardCol(colId){
  const c=clients.find(x=>x.id===boardClientId);
  const col=c.contentBoard.columns.find(x=>x.id===colId);
  if(col&&col.cards.length>0&&!confirm(`Delete "${col.label}" and all its ${col.cards.length} card(s)?`)) return;
  c.contentBoard.columns=c.contentBoard.columns.filter(x=>x.id!==colId);
  save(); renderBoardModal();
}
function addBoardCard(colId){
  const c=clients.find(x=>x.id===boardClientId);
  const col=c.contentBoard.columns.find(x=>x.id===colId);
  if(!col) return;
  const id=kbNextCardId++;
  col.cards.push({id,title:'New card',notes:'',hook:'',kameraVinklar:''});
  save();
  renderBoardModal();
  openCardEdit(colId,id);
}
function openCardEdit(colId,cardId){
  const c=clients.find(x=>x.id===boardClientId);
  const col=c&&c.contentBoard.columns.find(x=>x.id===colId);
  const card=col&&col.cards.find(x=>x.id===cardId);
  if(!card) return;
  ceColId=colId; ceCardId=cardId;
  document.getElementById('ce-modal-title').textContent=col.label;
  document.getElementById('ce-title').value=card.title||'';
  document.getElementById('ce-notes').value=card.notes||'';
  document.getElementById('ce-del-btn').onclick=()=>delCard(colId,cardId);
  open_('mCardEdit');
  setTimeout(()=>document.getElementById('ce-title').focus(),80);
}
function saveCard(){
  const c=clients.find(x=>x.id===boardClientId);
  const col=c&&c.contentBoard.columns.find(x=>x.id===ceColId);
  const card=col&&col.cards.find(x=>x.id===ceCardId);
  if(!card) return;
  card.title=document.getElementById('ce-title').value.trim()||'Untitled';
  card.notes=document.getElementById('ce-notes').value.trim();
  save(); close_('mCardEdit'); renderBoardModal();
  toast('Card saved','teal');
}
function delCard(colId,cardId){
  const c=clients.find(x=>x.id===boardClientId);
  const col=c&&c.contentBoard.columns.find(x=>x.id===colId);
  if(!col) return;
  col.cards=col.cards.filter(x=>x.id!==cardId);
  save(); close_('mCardEdit'); renderBoardModal();
  toast('Card deleted','red');
}

// ── SIDEBAR ───────────────────────────────────────────────────────────
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('collapsed');
}
function renderSidebarTeam(){
  const el=document.getElementById('sb-team-section');
  if(!el) return;
  if(!team.length){ el.innerHTML=''; return; }
  el.innerHTML=`<div class="sb-team-label">Filter by assignee</div>`+
    team.map(m=>`<button class="sb-item${filterAssignee===m.id?' active':''}" onclick="setAssigneeFilter(${m.id})">
      <span class="avatar" style="background:${m.color};width:18px;height:18px;font-size:0.55rem">${m.name[0]}</span>${m.name}
    </button>`).join('')+
    (filterAssignee?`<button class="sb-item" onclick="setAssigneeFilter(null)" style="font-size:0.75rem">✕ Clear filter</button>`:'');
}

// ── MODAL HELPERS ─────────────────────────────────────────────────────
function open_(id){ document.getElementById(id).classList.add('open'); }
function close_(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) close_(o.id); }));
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open')); });

// ── TOAST ─────────────────────────────────────────────────────────────
function toast(msg,type='teal'){
  const cols={teal:'var(--teal)',red:'var(--red)',purple:'var(--orange)',sky:'var(--sky)'};
  const w=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className='toast';
  el.innerHTML=`<div class="toast-dot" style="background:${cols[type]||cols.teal}"></div>${msg}`;
  w.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(8px)'; el.style.transition='all 0.25s'; setTimeout(()=>el.remove(),250); },3000);
}

// ── THEME ──────────────────────────────────────────────────────────────
function toggleTheme(){
  const light=document.documentElement.classList.toggle('light');
  document.getElementById('theme-toggle').textContent=light?'☀️':'🌙';
  localStorage.setItem('cf-theme',light?'light':'dark');
}
// Apply saved theme before first render
(function(){
  if(localStorage.getItem('cf-theme')==='light'){
    document.documentElement.classList.add('light');
    document.addEventListener('DOMContentLoaded',()=>{
      const btn=document.getElementById('theme-toggle');
      if(btn) btn.textContent='☀️';
    });
  }
})();

render();
</script>
</body>
</html>
